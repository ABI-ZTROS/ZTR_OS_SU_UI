name: Build Manager (UI-Only)

on:
  push:
    branches: [ "dev", "stable", "master" ]
    paths:
      - '.github/workflows/build-manager.yml'
      - 'manager/**'
  pull_request:
    branches: [ "dev", "stable", "master" ]
    paths:
      - '.github/workflows/build-manager.yml'
      - 'manager/**'
  workflow_dispatch:

jobs:
  build-manager:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./manager

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Write key
        run: |
          # Generate CI keystore
          keytool -genkeypair \
            -alias ztrosu \
            -keyalg RSA -keysize 2048 \
            -validity 36500 \
            -storepass ztrosu2025 \
            -keypass ztrosu2025 \
            -dname "CN=ZTR_OS_SU, OU=ZTR_OS, O=ZTR_OS, L=Unknown, ST=Unknown, C=CN" \
            -storetype JKS \
            -keystore key.jks
          {
            echo KEYSTORE_PASSWORD='ztrosu2025'
            echo KEY_ALIAS='ztrosu'
            echo KEY_PASSWORD='ztrosu2025'
            echo KEYSTORE_FILE='key.jks'
          } >> gradle.properties

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build with Gradle
        run: ./gradlew clean assembleRelease

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: manager-ui-only
          path: manager/app/build/outputs/apk/release/*.apk
